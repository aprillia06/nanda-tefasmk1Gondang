<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEFA SMKN 1 Gondang Nganjuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple-deep: #1a0030;
            --purple-mid: #4a0080;
            --purple-bright: #8b00ff;
            --purple-glow: #b44dff;
            --purple-light: #d580ff;
            --gold: #c9a227;
            --gold-light: #f0c84a;
            --black-pure: #000000;
            --black-deep: #050508;
            --black-card: #0d0d1a;
            --black-glass: rgba(10, 5, 20, 0.85);
            --text-primary: #f0e8ff;
            --text-muted: #a090c0;
            --border-glow: rgba(138, 0, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--black-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--black-deep); }
        ::-webkit-scrollbar-thumb { background: var(--purple-bright); border-radius: 3px; }

        /* ─── Cursor glow effect ─── */
        .cursor-glow {
            width: 20px; height: 20px;
            background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
            position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            mix-blend-mode: screen;
        }

        /* ─── Background Particles ─── */
        #particles-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--purple-glow);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ─── NAVBAR ─── */
        .navbar {
            background: linear-gradient(180deg, rgba(0,0,0,0.98) 0%, rgba(5,2,15,0.95) 100%) !important;
            border-bottom: 1px solid var(--border-glow);
            backdrop-filter: blur(20px);
            padding: 12px 0;
            transition: all 0.4s ease;
            position: fixed; width: 100%; z-index: 1000;
        }
        .navbar.scrolled {
            box-shadow: 0 4px 30px rgba(138,0,255,0.2);
        }
        .navbar-brand {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary) !important;
            display: flex; align-items: center; gap: 12px;
            letter-spacing: 0.05em;
        }
        .navbar-brand img {
            height: 45px;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
            filter: brightness(1.1);
        }
        .navbar-brand span {
            color: white;
        }
        .nav-link {
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.88rem;
            color: var(--text-muted) !important;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 16px !important;
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute; bottom: 4px; left: 50%;
            width: 0; height: 1px;
            background: var(--purple-glow);
            transform: translateX(-50%);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--purple-glow);
        }
        .nav-link:hover, .nav-link.active {
            color: var(--purple-light) !important;
        }
        .nav-link:hover::after, .nav-link.active::after {
            width: 70%;
        }
        .navbar-toggler {
            border: 1px solid var(--border-glow);
            padding: 6px 10px;
        }
        .navbar-toggler-icon {
            filter: invert(1);
        }

        /* ─── HERO ─── */
        .hero-section {
            min-height: 100vh;
            background: var(--black-deep);
            position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .hero-bg-overlay {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 50%, rgba(74,0,128,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 100% 100% at 80% 80%, rgba(138,0,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 100% 100% at 20% 20%, rgba(180,77,255,0.06) 0%, transparent 60%);
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(138,0,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(138,0,255,0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }
        .hero-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 8s ease-in-out infinite;
        }
        .hero-orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(74,0,128,0.4) 0%, transparent 70%);
            top: -10%; left: -10%;
            animation-delay: 0s;
        }
        .hero-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(138,0,255,0.25) 0%, transparent 70%);
            bottom: -5%; right: -5%;
            animation-delay: -4s;
        }
        .hero-orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(201,162,39,0.1) 0%, transparent 70%);
            top: 40%; left: 60%;
            animation-delay: -2s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .hero-content {
            position: relative; z-index: 2;
            text-align: center;
            padding: 0 20px;
        }
        .hero-badge {
            display: inline-block;
            border: 1px solid var(--border-glow);
            background: rgba(138,0,255,0.1);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--purple-light);
            margin-bottom: 28px;
            backdrop-filter: blur(10px);
            animation: fadeInDown 0.8s ease;
        }
        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.8rem);
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 24px;
            color: white;
            animation: fadeInUp 0.8s ease 0.2s;
        }
        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto 40px;
            line-height: 1.7;
            animation: fadeInUp 0.8s ease 0.4s;
        }
        .hero-buttons {
            display: flex; gap: 16px;
            justify-content: center; flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.6s;
        }
        .btn-primary-glow {
            background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright));
            border: none;
            color: white;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(138,0,255,0.4);
        }
        .btn-primary-glow::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--purple-bright), var(--purple-mid));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-primary-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(138,0,255,0.6);
            color: white;
        }
        .btn-primary-glow:hover::before { opacity: 1; }
        .btn-outline-glow {
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--purple-light);
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-outline-glow:hover {
            background: rgba(138,0,255,0.15);
            border-color: var(--purple-glow);
            box-shadow: 0 0 20px rgba(138,0,255,0.3);
            color: var(--purple-light);
            transform: translateY(-3px);
        }
        .hero-scroll-indicator {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeIn 1s 1s;
        }
        .scroll-line {
            width: 1px; height: 50px;
            background: linear-gradient(to bottom, var(--purple-glow), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        /* ─── SECTION BASE ─── */
        section { position: relative; z-index: 1; }
        .section-wrapper {
            padding: 100px 0;
            position: relative;
        }
        .section-title-block {
            text-align: center;
            margin-bottom: 70px;
        }
        .section-eyebrow {
            display: inline-block;
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--purple-glow);
            margin-bottom: 12px;
        }
        .section-heading {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
        .section-divider {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple-bright), transparent);
            margin: 0 auto 20px;
        }
        .section-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 560px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* ─── STATS BAR ─── */
        .stats-section {
            background: linear-gradient(180deg, var(--black-deep) 0%, var(--purple-deep) 50%, var(--black-deep) 100%);
            border-top: 1px solid var(--border-glow);
            border-bottom: 1px solid var(--border-glow);
            padding: 60px 0;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
        }
        .stat-number {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ─── VISI MISI ─── */
        .visi-misi-section {
            background: var(--black-deep);
        }
        .vm-card {
            background: linear-gradient(135deg, var(--black-card) 0%, rgba(20,5,40,0.9) 100%);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 40px;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .vm-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--purple-bright), transparent);
        }
        .vm-card:hover {
            transform: translateY(-8px);
            border-color: var(--purple-glow);
            box-shadow: 0 20px 60px rgba(138,0,255,0.2);
        }
        .vm-icon-wrap {
            width: 60px; height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(138,0,255,0.35);
        }
        .vm-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
        .vm-card p, .vm-card ol {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.8;
        }
        .vm-card ol { padding-left: 18px; }
        .vm-card ol li { margin-bottom: 8px; }

        /* ─── PROGRAM CARDS ─── */
        .program-section {
            background: linear-gradient(180deg, var(--black-deep) 0%, var(--purple-deep) 100%);
        }
        .program-card {
            background: var(--black-glass);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .program-card::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(138,0,255,0.06), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .program-card:hover::after { opacity: 1; }
        .program-card:hover {
            transform: translateY(-10px);
            border-color: var(--purple-glow);
            box-shadow: 0 24px 60px rgba(138,0,255,0.25);
        }
        .program-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            position: relative;
        }
        .program-icon::after {
            content: '';
            position: absolute; inset: -2px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--purple-bright), var(--gold)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
        }
        .program-icon-1 { background: linear-gradient(135deg, rgba(74,0,128,0.4), rgba(138,0,255,0.2)); color: var(--purple-light); }
        .program-icon-2 { background: linear-gradient(135deg, rgba(0,60,30,0.4), rgba(0,180,80,0.2)); color: #5dffb0; }
        .program-icon-3 { background: linear-gradient(135deg, rgba(100,80,0,0.4), rgba(201,162,39,0.2)); color: var(--gold-light); }
        .program-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }
        .program-card p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.7;
        }

        /* ─── JURUSAN ─── */
        .jurusan-section {
            background: var(--black-deep);
            padding: 100px 0;
        }
        .jurusan-category-header {
            display: flex; align-items: center; gap: 16px;
            margin-bottom: 36px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-glow);
        }
        .jurusan-category-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .cat-tech { background: linear-gradient(135deg, var(--purple-mid), var(--purple-bright)); }
        .cat-agri { background: linear-gradient(135deg, #0d4a1f, #22c55e); }
        .jurusan-category-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem; font-weight: 700;
            color: white;
        }
        .jurusan-card {
            background: linear-gradient(160deg, #0d0a1a 0%, #100520 100%);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            overflow: hidden;
            height: 100%;
            transition: all 0.4s ease;
            position: relative;
        }
        .jurusan-card:hover {
            transform: translateY(-10px);
            border-color: var(--purple-glow);
            box-shadow: 0 20px 60px rgba(138,0,255,0.25);
        }
        .jurusan-card-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
            filter: brightness(0.7) saturate(0.8);
            transition: all 0.4s ease;
        }
        .jurusan-card:hover .jurusan-card-img {
            filter: brightness(0.85) saturate(1.1);
            transform: scale(1.04);
        }
        .jurusan-card-img-wrap {
            overflow: hidden;
            position: relative;
        }
        .jurusan-card-img-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(13,10,26,0.8) 0%, transparent 60%);
        }
        .jurusan-card-body {
            padding: 24px;
        }
        .jurusan-card-title {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--purple-light);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .jurusan-card-text {
            color: var(--text-muted);
            font-size: 0.83rem;
            line-height: 1.7;
        }
        .jurusan-card-text strong { color: var(--text-primary); }

        /* ─── GALERI ─── */
        .galeri-section {
            background: linear-gradie
